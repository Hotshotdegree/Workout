<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10-Day PPL</title>
<style>
html,body{margin:0;padding:0;background:#090909!important;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
input,textarea{font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
::-webkit-input-placeholder{color:rgba(255,255,255,0.12);}
</style>
</head>
<body style="background:#090909;color:#f0f0f0;margin:0;padding:0;min-height:100vh;">

<div id="root" style="background:#090909;min-height:100vh;"></div>

<script>
var DAYS=[
  {type:"push",focus:"Chest / Shoulders / Triceps",note:"Light weight. Re-establish motor patterns after 6 months. Control every rep.",
   ex:[["DB Flat Press","3","10","2 sec descent, elbows slightly tucked"],["DB Incline Press","3","10","30-45 degrees, feel the upper chest stretch"],["DB Lateral Raise","3","12","Slight elbow bend, raise to shoulder height"],["DB Overhead Press","3","10","Seated, keep core braced throughout"],["DB Tricep Kickback","3","12","Elbow stays high, full extension at back"],["DB Front Raise","2","12","Alternate arms, slow and controlled"]],
   cardio:"10 min light walk or 5 min skip rope. Keep HR Zone 2.",opt:true},
  {type:"pull",focus:"Back / Biceps / Rear Delts",note:"Feel the lat contracting on every pull. Not just moving weight.",
   ex:[["Pull-Ups","3","5-6","Dead hang start, full ROM. Assisted machine OK."],["Lat Pulldown","3","12","Wide grip, pull to upper chest, squeeze lats"],["DB Reverse Fly","3","12","Bent over, arms wide, rear delt focus"],["DB Hammer Curl","3","12","Neutral grip, no swinging"],["DB Bicep Curl","2","12","Supinate at top, slow on the way down"],["Cable Face Pull","2","15","Rope to forehead, external rotation at end"]],
   cardio:"10 min easy bike or brisk walk.",opt:true},
  {type:"legs",focus:"Quads / Hamstrings / Glutes / Calves",note:"Very light or bodyweight. You will be sore tomorrow - that is the point.",
   ex:[["DB Goblet Squat","3","12","DB at chest, sit deep, knees track toes"],["DB Romanian Deadlift","3","10","Hinge not squat, feel hamstring stretch"],["DB Walking Lunge","3","10","Per leg, upright torso throughout"],["DB Sumo Squat","3","12","Wide stance, toes out, DB between legs"],["Calf Raises (DB)","3","20","Slow up, pause at top, controlled down"],["Glute Bridge (DB)","3","15","DB on hips, drive hard through heels"]],
   cardio:"10 min walk after. Helps flush legs.",opt:true},
  {type:"rest",focus:"Recovery + Easy Run",note:"Stretch hips, hamstrings, chest and lats. Sleep is your biggest gains tool.",
   ex:[],cardio:"Running: 90s run / 2min walk x 8 rounds. Zone 2-3. Flat route. Post-run: calf stretch, hip flexor, tibialis raises x20.",opt:false},
  {type:"push",focus:"Chest / Shoulders / Triceps",note:"Slightly heavier than Day 1. Add one set where it felt easy last time.",
   ex:[["DB Flat Press","4","10","Add 1 set. Same or slightly heavier."],["DB Incline Press","3","10","Go heavier if Day 1 felt manageable"],["DB Arnold Press","3","10","Rotation on press, hits all 3 delt heads"],["DB Lateral Raise","3","15","Higher reps, lighter weight"],["DB Overhead Tricep Ext","3","12","Both hands one DB, elbow stays fixed"],["DB Chest Fly","3","12","Wide arc, squeeze at top"]],
   cardio:"12 min light jog. Zone 2 only.",opt:true},
  {type:"pull",focus:"Back / Biceps / Rear Delts",note:"More lat volume. Push 1 extra rep per set on pull-ups vs Day 2.",
   ex:[["Pull-Ups","4","5-7","Add a set. Aim for 1 more rep than Day 2."],["Lat Pulldown","4","10","Heavier than Day 2, same controlled form"],["Seated Cable Row","3","12","Elbows drive back, squeeze mid-back hard"],["DB Reverse Fly","3","15","Higher reps, lighter weight"],["DB Incline Curl","3","12","Full bicep stretch at bottom"],["DB Zottman Curl","3","10","Curl up palms up, rotate at top, lower palms down"]],
   cardio:"10 min easy walk or light skip.",opt:true},
  {type:"legs",focus:"Quads / Hamstrings / Glutes / Calves",note:"Over the initial soreness now. Push the weight a little more.",
   ex:[["DB Goblet Squat","4","12","Add a set, heavier DB if possible"],["DB Romanian Deadlift","4","10","Heavier, pause at bottom stretch"],["DB Reverse Lunge","3","10","Per leg. More knee-friendly than forward."],["DB Bulgarian Split Squat","3","8","Per leg. Rear foot elevated. Humbling."],["DB Stiff-Leg Deadlift","3","12","Less knee bend than RDL, upper ham focus"],["Calf Raises (DB)","4","20","Add a set, same controlled tempo"]],
   cardio:"10 min walk or light jog.",opt:true},
  {type:"rest",focus:"Recovery + Run",note:"Active rest. Light walk, stretch, foam roll. Eat your protein.",
   ex:[],cardio:"Running: 2min run / 2min walk x 8-10 rounds. Progress from Day 4 if ready. Post-run routine non-negotiable.",opt:false},
  {type:"push",focus:"Chest / Shoulders / Triceps",note:"Higher volume. Compound-first. This is a real workout now.",
   ex:[["DB Flat Press","4","12","Rep goal up. Control tempo."],["DB Incline Press","4","10","Heavier than Day 5"],["DB Arnold Press","3","12","Heavier than Day 5 if form allows"],["DB Lateral Raise","4","15","Drop set on last - fail then drop weight"],["DB Overhead Tricep Ext","3","15","Higher reps, lighter - full pump"],["DB Chest Fly","3","15","Finisher. Feel the stretch."]],
   cardio:"15 min jog or 10 min HIIT. Your call.",opt:true},
  {type:"legs",focus:"Quads / Hamstrings / Glutes / Calves",note:"Final session. Go hard. Note every weight - this is your baseline.",
   ex:[["DB Goblet Squat","4","15","Higher reps, feel the quad burn"],["DB Romanian Deadlift","4","12","Heaviest of 10 days. Write it down."],["DB Bulgarian Split Squat","4","10","Per leg. Heavier than Day 7."],["DB Sumo Squat","3","15","Wide stance, deep, inner quad focus"],["DB Stiff-Leg Deadlift","3","12","Full stretch, controlled up"],["Calf Raises (DB)","4","25","Final push. Slow all the way."]],
   cardio:"15 min easy jog to finish 10 days strong.",opt:true}
];

var WD=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var TC={push:"#f0e040",pull:"#40c8f0",legs:"#c040f0",rest:"#3a3a3a"};
var TN={push:"PUSH",pull:"PULL",legs:"LEGS",rest:"REST"};

function store(){try{return JSON.parse(localStorage.getItem("ppl10gh")||"{}");}catch(e){return{};}}
function persist(d){try{localStorage.setItem("ppl10gh",JSON.stringify(d));}catch(e){}}

function deficit(i){
  var s=store();
  var b=parseFloat(s["b"+i])||0,w=parseFloat(s["w"+i])||0,e=parseFloat(s["e"+i])||0;
  if(!b&&!e)return null;
  return (b+w)-e;
}

function totals(){
  var s=store(),tb=0,te=0;
  for(var i=0;i<10;i++){tb+=(parseFloat(s["b"+i])||0)+(parseFloat(s["w"+i])||0);te+=parseFloat(s["e"+i])||0;}
  return{burned:tb,eaten:te,def:tb-te};
}

function renderAll(){renderHeader();renderCal();}

function renderHeader(){
  var t=totals();
  var defEl=document.getElementById("hdef");
  var col=(!t.burned&&!t.eaten)?"#f0e040":t.def>=0?"#40e080":"#e04040";
  var txt=(!t.burned&&!t.eaten)?"0 kcal":t.def>=0?("+"+t.def.toLocaleString()+" kcal"):(t.def.toLocaleString()+" kcal");
  defEl.textContent=txt; defEl.style.color=col;
  document.getElementById("hburn").textContent=t.burned?t.burned.toLocaleString():"0";
  document.getElementById("heat").textContent=t.eaten?t.eaten.toLocaleString():"0";
}

function renderCal(){
  var grid=document.getElementById("grid");
  grid.innerHTML="";
  var s=store();
  for(var i=0;i<10;i++){
    (function(idx){
      var d=DAYS[idx];
      var done=!!s["done"+idx];
      var def=deficit(idx);
      var clickable=d.type!=="rest"||!!d.cardio;
      var tc=TC[d.type];

      var tile=document.createElement("div");
      tile.style.cssText="background:"+(done?"#141414":"#111")+";border:1px solid #222;border-top:3px solid "+tc+";border-radius:8px;padding:14px 14px 12px;min-height:140px;display:flex;flex-direction:column;justify-content:space-between;"+(clickable?"cursor:pointer;":"cursor:default;opacity:"+(d.type==="rest"?"0.7":"1")+";");

      var numColor=done?"rgba(240,224,64,0.3)":"#222";
      var defBadge="";
      if(done&&def!==null){
        var dc=def>=0?"#40e080":"#e04040";
        defBadge='<span style="font-size:11px;font-weight:700;color:'+dc+';">'+(def>=0?"+":"")+Math.round(def)+" kcal</span>";
      }

      tile.innerHTML=
        '<div>'+
          '<div style="font-size:42px;font-weight:900;line-height:1;color:'+numColor+';">'+(idx<9?"0":"")+(idx+1)+'</div>'+
          '<div style="font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#555;margin-top:2px;">'+WD[(2+idx)%7]+'</div>'+
        '</div>'+
        '<div>'+
          '<div style="font-size:20px;font-weight:900;color:'+tc+';margin-top:4px;">'+TN[d.type]+'</div>'+
          '<div style="font-size:10px;color:#555;margin-top:3px;line-height:1.35;">'+d.focus+'</div>'+
        '</div>'+
        (done?'<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#f0e040;margin-top:4px;"><span>&#11088;</span>'+defBadge+'</div>':'<div></div>');

      if(clickable){tile.addEventListener("click",function(){openDay(idx);});}
      grid.appendChild(tile);
    })(i);
  }
}

function openDay(idx){
  var d=DAYS[idx];
  var s=store();
  var done=!!s["done"+idx];
  var tc=TC[d.type];
  var def=deficit(idx);

  var exRows="";
  for(var j=0;j<d.ex.length;j++){
    var e=d.ex[j];
    exRows+='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:11px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.05);border-radius:6px;margin-bottom:4px;">'+
      '<div style="flex:1;min-width:0;">'+
        '<div style="font-size:13px;color:rgba(255,255,255,0.88);font-weight:500;">'+e[0]+'</div>'+
        (e[3]?'<div style="font-size:10px;color:rgba(255,255,255,0.28);margin-top:2px;line-height:1.4;">'+e[3]+'</div>':'')+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">'+
        '<div style="font-size:17px;font-weight:700;color:rgba(255,255,255,0.4);">'+e[1]+'</div>'+
        '<div style="font-size:10px;color:rgba(255,255,255,0.2);">x</div>'+
        '<div style="font-size:17px;font-weight:900;color:#fff;">'+e[2]+'</div>'+
      '</div>'+
    '</div>';
  }

  var defTxt=def===null?"--":(def>=0?"+"+Math.round(def):String(Math.round(def)));
  var defCol=def===null?"rgba(255,255,255,0.2)":def>=0?"#40e080":"#e04040";

  var bv=s["b"+idx]||"",wv=s["w"+idx]||"",ev=s["e"+idx]||"",nv=s["n"+idx]||"";

  document.getElementById("daypage").innerHTML=
    '<div style="position:sticky;top:0;z-index:10;background:rgba(12,21,64,0.97);border-bottom:1px solid rgba(255,255,255,0.07);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;">'+
      '<button onclick="goBack()" style="background:none;border:1px solid rgba(255,255,255,0.2);border-radius:50px;padding:7px 16px;color:rgba(255,255,255,0.6);font-size:11px;letter-spacing:.08em;cursor:pointer;text-transform:uppercase;">&#8592; Back</button>'+
      '<div style="font-size:11px;letter-spacing:.25em;color:rgba(255,255,255,0.35);text-transform:uppercase;">DAY '+(idx+1)+' / '+WD[(2+idx)%7].toUpperCase()+'</div>'+
      '<div style="width:70px;"></div>'+
    '</div>'+
    '<div style="padding:22px 16px 16px;">'+
      '<div style="display:inline-block;font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:10px;background:'+tc+'20;color:'+tc+';border:1px solid '+tc+'40;">'+TN[d.type]+' DAY</div>'+
      '<div style="font-size:30px;font-weight:900;color:#fff;line-height:1;">'+d.focus+'</div>'+
      '<div style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:8px;line-height:1.5;">'+d.note+'</div>'+
    '</div>'+
    (d.ex.length?'<div style="padding:0 16px 20px;"><div style="font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,0.25);padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:10px;">Exercises</div>'+exRows+'</div>':'')+
    (d.cardio?'<div style="margin:0 16px 20px;padding:14px;border:1px dashed rgba(255,255,255,0.12);border-radius:8px;"><div style="font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:8px;">Cardio '+(d.opt?'<span style="font-size:7px;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.2);">OPTIONAL</span>':'')+'</div><div style="font-size:12px;color:rgba(255,255,255,0.5);line-height:1.6;">'+d.cardio+'</div></div>':'')+
    '<div style="margin:0 16px 20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px;">'+
      '<div style="font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,0.25);padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:12px;">Calorie Log</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'+
        '<div><div style="font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:4px;">Watch Daily Burn</div><input id="ci-b" type="number" placeholder="2400" value="'+bv+'" oninput="saveC('+idx+')" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:10px 11px;font-size:22px;font-weight:900;color:#fff;outline:none;width:100%;"><div style="font-size:8px;color:rgba(255,255,255,0.2);text-transform:uppercase;margin-top:3px;">kcal activity ring</div></div>'+
        '<div><div style="font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:4px;">Workout Burn</div><input id="ci-w" type="number" placeholder="300" value="'+wv+'" oninput="saveC('+idx+')" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:10px 11px;font-size:22px;font-weight:900;color:#fff;outline:none;width:100%;"><div style="font-size:8px;color:rgba(255,255,255,0.2);text-transform:uppercase;margin-top:3px;">kcal from session</div></div>'+
        '<div style="grid-column:1/-1;"><div style="font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:4px;">Daily Intake</div><input id="ci-e" type="number" placeholder="1800" value="'+ev+'" oninput="saveC('+idx+')" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:10px 11px;font-size:22px;font-weight:900;color:#fff;outline:none;width:100%;"><div style="font-size:8px;color:rgba(255,255,255,0.2);text-transform:uppercase;margin-top:3px;">kcal everything eaten</div></div>'+
      '</div>'+
      '<div style="margin-top:12px;padding:12px;background:rgba(255,255,255,0.04);border-radius:6px;text-align:center;">'+
        '<div style="font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:3px;">Today Deficit / Surplus</div>'+
        '<div id="livedef" style="font-size:36px;font-weight:900;line-height:1;color:'+defCol+';">'+defTxt+'</div>'+
      '</div>'+
    '</div>'+
    '<div style="padding:0 16px 16px;">'+
      '<div style="font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,0.25);padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:8px;">Session Notes</div>'+
      '<textarea id="ci-n" oninput="saveN('+idx+')" placeholder="Weight used, how it felt, any pain..." style="width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:12px;color:rgba(255,255,255,0.7);font-size:13px;resize:none;height:76px;outline:none;">'+nv+'</textarea>'+

document.getElementById(“calpage”).style.display=“none”;
document.getElementById(“daypage”).style.display=“block”;
document.getElementById(“daypage”).style.background=“linear-gradient(150deg,#0c1540 0%,#160c38 50%,#200a40 100%)”;
document.getElementById(“daypage”).style.minHeight=“100vh”;
window.scrollTo(0,0);
window._curDay=idx;
}

function goBack(){
document.getElementById(“daypage”).style.display=“none”;
document.getElementById(“calpage”).style.display=“block”;
renderAll();
window.scrollTo(0,0);
}

function saveC(idx){
var s=store();
var b=document.getElementById(“ci-b”),w=document.getElementById(“ci-w”),e=document.getElementById(“ci-e”);
if(b)s[“b”+idx]=b.value; if(w)s[“w”+idx]=w.value; if(e)s[“e”+idx]=e.value;
persist(s);
var def=deficit(idx);
var el=document.getElementById(“livedef”);
if(el){el.textContent=def===null?”–”:(def>=0?”+”+Math.round(def):String(Math.round(def)));el.style.color=def===null?“rgba(255,255,255,0.2)”:def>=0?”#40e080”:”#e04040”;}
renderHeader();
}

function saveN(idx){var s=store();var n=document.getElementById(“ci-n”);if(n)s[“n”+idx]=n.value;persist(s);}

function toggleDone(idx){
var s=store();s[“done”+idx]=!s[“done”+idx];persist(s);
var btn=document.getElementById(“donebtn”);
if(btn){
var done=s[“done”+idx];
btn.innerHTML=done?”⭐ Completed - Tap to Undo”:“Mark Workout Complete”;
btn.style.background=done?“rgba(64,224,128,0.1)”:“rgba(240,224,64,0.08)”;
btn.style.color=done?”#40e080”:”#f0e040”;
btn.style.borderColor=done?“rgba(64,224,128,0.25)”:“rgba(240,224,64,0.25)”;
}
renderHeader();
}

root.innerHTML=
‘<div id="calpage" style="background:#090909;min-height:100vh;">’+
‘<div style="position:sticky;top:0;z-index:50;background:#0d0d0d;border-bottom:1px solid #1c1c1c;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;">’+
‘<div>’+
‘<div style="font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#444;">10-Day Deficit</div>’+

‘<div style="display:flex;flex-direction:column;align-items:flex-end;"><span style="font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:#444;">Eaten</span><span id="heat" style="font-size:16px;font-weight:700;line-height:1;">0</span></div>’+
‘</div>’+
‘</div>’+
‘<div style="padding:20px 14px 40px;">’+
‘<div style="font-size:60px;font-weight:900;line-height:0.9;letter-spacing:-2px;margin-bottom:22px;">10<br><span style="color:#f0e040;">DAYS.</span></div>’+
‘<div id="grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"></div>’+
‘</div>’+
‘</div>’+
‘<div id="daypage" style="display:none;"></div>’;

renderAll();
</script>
