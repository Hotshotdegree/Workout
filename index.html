<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10-Day PPL Program</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET & ROOT ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
–bg: #080808;
–yellow: #f5e642;
–yellow-dim: #a89e1e;
–card: #111111;
–card-hover: #1a1a1a;
–border: #222;
–text: #f0f0f0;
–muted: #555;
–push: #f5e642;
–pull: #42c8f5;
–legs: #c842f5;
–rest: #333;
–deficit-good: #42f57e;
–deficit-bad: #f54242;
}

html, body { height:100%; overflow-x:hidden; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-weight: 300;
min-height: 100vh;
}

/* ── NOISE TEXTURE OVERLAY ── */
body::before {
content:’’;
position:fixed; inset:0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.03’/%3E%3C/svg%3E”);
pointer-events:none; z-index:0; opacity:0.4;
}

/* ── DEFICIT HEADER ── */
.deficit-header {
position: sticky; top:0; z-index:50;
background: #0a0a0a;
border-bottom: 1px solid #1a1a1a;
padding: 14px 24px;
display: flex; align-items: center; justify-content: space-between;
gap: 16px;
}

.deficit-left { display:flex; flex-direction:column; gap:2px; }

.deficit-label {
font-family: ‘DM Mono’, monospace;
font-size: 9px; letter-spacing: 0.2em;
text-transform: uppercase; color: var(–muted);
}

.deficit-value {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 38px; line-height:1;
color: var(–yellow);
transition: color 0.3s;
}
.deficit-value.surplus { color: var(–deficit-bad); }
.deficit-value.good { color: var(–deficit-good); }

.deficit-meta {
display:flex; gap:20px; align-items:center;
}
.deficit-stat { display:flex; flex-direction:column; align-items:flex-end; gap:1px; }
.deficit-stat span:first-child {
font-family:‘DM Mono’,monospace; font-size:9px;
text-transform:uppercase; letter-spacing:0.15em; color:var(–muted);
}
.deficit-stat span:last-child {
font-family:‘Bebas Neue’,sans-serif; font-size:22px; color:var(–text); line-height:1;
}

.header-title {
position:absolute; left:50%; transform:translateX(-50%);
font-family:‘Bebas Neue’,sans-serif; font-size:13px;
letter-spacing:0.3em; color:var(–muted);
text-transform:uppercase;
}

/* ── CALENDAR GRID ── */
.calendar-wrap {
padding: 28px 20px 40px;
position: relative; z-index:1;
}

.calendar-title {
font-family:‘Bebas Neue’,sans-serif;
font-size: clamp(52px, 10vw, 96px);
line-height:0.88; letter-spacing:-1px;
margin-bottom: 28px;
padding: 0 4px;
}
.calendar-title span { color: var(–yellow); }

.calendar-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
gap: 12px;
}

/* ── DAY TILE ── */
.day-tile {
background: var(–card);
border: 1px solid var(–border);
border-radius: 6px;
padding: 18px 16px 16px;
cursor: pointer;
position: relative;
overflow: hidden;
min-height: 160px;
display: flex; flex-direction:column; justify-content:space-between;
transition: border-color 0.15s, transform 0.15s, background 0.15s;
}
.day-tile:hover { background: var(–card-hover); transform:translateY(-3px); }
.day-tile.rest-tile { opacity:0.7; }
.day-tile.rest-tile.no-action { cursor:default; }
.day-tile.rest-tile.no-action:hover { transform:none; }

/* type accent bar */
.day-tile::before {
content:’’;
position:absolute; top:0; left:0; right:0; height:3px;
}
.day-tile.push-tile::before { background: var(–push); }
.day-tile.pull-tile::before { background: var(–pull); }
.day-tile.legs-tile::before { background: var(–legs); }
.day-tile.rest-tile::before { background: var(–rest); }

.tile-top { display:flex; justify-content:space-between; align-items:flex-start; }

.tile-day-num {
font-family:‘Bebas Neue’,sans-serif;
font-size: 52px; line-height:1; color: #222;
transition: color 0.15s;
}
.day-tile:hover .tile-day-num { color:#333; }
.day-tile.done-tile .tile-day-num { color: var(–yellow); opacity:0.3; }

.tile-weekday {
font-family:‘DM Mono’,monospace;
font-size:9px; letter-spacing:0.15em;
text-transform:uppercase; color:var(–muted);
text-align:right; margin-top:4px;
}

.tile-type {
font-family:‘Bebas Neue’,sans-serif;
font-size:22px; letter-spacing:0.5px;
margin-top:8px;
}
.push-tile .tile-type { color:var(–push); }
.pull-tile .tile-type { color:var(–pull); }
.legs-tile .tile-type { color:var(–legs); }
.rest-tile .tile-type { color:var(–muted); }

.tile-focus {
font-size:11px; color:var(–muted); margin-top:3px;
line-height:1.4;
}

.tile-bottom { display:flex; flex-direction:column; gap:4px; }

/* ── DONE STATE ── */
.tile-done-badge {
display:none;
align-items:center; gap:6px;
font-family:‘DM Mono’,monospace; font-size:10px;
color:var(–yellow);
}
.day-tile.done-tile .tile-done-badge { display:flex; }

.star-icon { font-size:14px; }

.tile-deficit-display {
font-family:‘Bebas Neue’,sans-serif;
font-size:13px;
color: var(–deficit-good);
}
.tile-deficit-display.surplus { color: var(–deficit-bad); }

/* ── DAY DETAIL OVERLAY ── */
.detail-overlay {
display:none;
position:fixed; inset:0; z-index:100;
background: linear-gradient(135deg, #0d1b4d 0%, #1a0a3d 40%, #2d0a4d 100%);
overflow-y:auto;
animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
}
.detail-overlay.open { display:block; }

@keyframes slideUp {
from { transform:translateY(30px); opacity:0; }
to { transform:translateY(0); opacity:1; }
}

.detail-inner { padding: 0 0 60px; min-height:100vh; }

/* detail header */
.detail-header {
padding: 20px 24px 24px;
border-bottom: 1px solid rgba(255,255,255,0.08);
position:sticky; top:0; z-index:10;
background: rgba(13,27,77,0.95);
backdrop-filter: blur(12px);
display:flex; align-items:center; justify-content:space-between;
}

.back-btn {
background:none; border:1px solid rgba(255,255,255,0.15);
border-radius:50px; padding:8px 18px;
color:rgba(255,255,255,0.6); font-family:‘DM Mono’,monospace;
font-size:11px; letter-spacing:0.1em; cursor:pointer;
text-transform:uppercase; transition:all 0.15s;
}
.back-btn:hover { border-color:rgba(255,255,255,0.4); color:#fff; }

.detail-day-label {
font-family:‘Bebas Neue’,sans-serif;
font-size:13px; letter-spacing:0.3em;
color:rgba(255,255,255,0.4); text-transform:uppercase;
}

/* detail hero */
.detail-hero { padding:28px 24px 20px; }

.detail-type-badge {
display:inline-block;
font-family:‘DM Mono’,monospace; font-size:10px;
letter-spacing:0.2em; text-transform:uppercase;
padding:4px 12px; border-radius:20px; margin-bottom:12px;
}
.push-badge { background:rgba(245,230,66,0.15); color:var(–push); border:1px solid rgba(245,230,66,0.3); }
.pull-badge { background:rgba(66,200,245,0.15); color:var(–pull); border:1px solid rgba(66,200,245,0.3); }
.legs-badge { background:rgba(200,66,245,0.15); color:var(–legs); border:1px solid rgba(200,66,245,0.3); }

.detail-title {
font-family:‘Bebas Neue’,sans-serif;
font-size: clamp(42px,8vw,72px); line-height:0.9;
letter-spacing:-0.5px; color:#fff;
}
.detail-subtitle {
margin-top:8px; font-size:13px;
color:rgba(255,255,255,0.4); line-height:1.5;
}

/* ── EXERCISE TABLE ── */
.exercise-section { padding:0 24px; }

.section-heading {
font-family:‘DM Mono’,monospace; font-size:9px;
letter-spacing:0.25em; text-transform:uppercase;
color:rgba(255,255,255,0.3); margin-bottom:12px;
padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.06);
}

.exercise-list { display:flex; flex-direction:column; gap:2px; margin-bottom:28px; }

.ex-row {
display:grid;
grid-template-columns: 1fr auto auto;
gap:12px; align-items:center;
padding:12px 14px;
background:rgba(255,255,255,0.04);
border-radius:6px;
border:1px solid rgba(255,255,255,0.05);
transition: background 0.15s;
}
.ex-row:hover { background:rgba(255,255,255,0.07); }

.ex-name {
font-size:14px; color:rgba(255,255,255,0.85); font-weight:400;
}
.ex-note { font-size:11px; color:rgba(255,255,255,0.3); margin-top:2px; }

.ex-sets {
font-family:‘Bebas Neue’,sans-serif; font-size:20px;
color:rgba(255,255,255,0.5); white-space:nowrap; text-align:right;
}
.ex-reps {
font-family:‘Bebas Neue’,sans-serif; font-size:20px;
color:#fff; white-space:nowrap; text-align:right; min-width:48px;
}

.optional-tag {
display:inline-block; font-size:9px; font-family:‘DM Mono’,monospace;
letter-spacing:0.1em; text-transform:uppercase;
padding:2px 7px; border-radius:3px;
background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.3);
margin-left:6px; vertical-align:middle;
}

/* ── CALORIE LOG ── */
.calorie-section {
margin: 0 24px 24px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:10px; padding:20px;
}

.cal-grid {
display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px;
}
.cal-field { display:flex; flex-direction:column; gap:5px; }
.cal-field.full { grid-column:1/-1; }

.cal-label {
font-family:‘DM Mono’,monospace; font-size:9px;
letter-spacing:0.2em; text-transform:uppercase;
color:rgba(255,255,255,0.35);
}
.cal-input {
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
border-radius:6px; padding:10px 12px;
font-family:‘Bebas Neue’,sans-serif; font-size:24px;
color:#fff; outline:none; width:100%;
transition: border-color 0.15s;
}
.cal-input:focus { border-color:rgba(255,255,255,0.35); }
.cal-input::placeholder { color:rgba(255,255,255,0.15); }

.cal-unit {
font-family:‘DM Mono’,monospace; font-size:9px;
color:rgba(255,255,255,0.25); letter-spacing:0.1em;
text-transform:uppercase; margin-top:2px;
}

.day-deficit-display {
margin-top:14px; padding:14px;
background:rgba(255,255,255,0.04);
border-radius:6px; text-align:center;
}
.day-deficit-label {
font-family:‘DM Mono’,monospace; font-size:9px;
letter-spacing:0.2em; text-transform:uppercase;
color:rgba(255,255,255,0.3); margin-bottom:4px;
}
.day-deficit-num {
font-family:‘Bebas Neue’,sans-serif; font-size:42px;
color: var(–deficit-good); line-height:1;
transition: color 0.2s;
}
.day-deficit-num.surplus { color: var(–deficit-bad); }

/* ── MARK DONE BUTTON ── */
.done-section { padding:0 24px; }

.mark-done-btn {
width:100%; padding:16px;
border-radius:8px; border:none; cursor:pointer;
font-family:‘Bebas Neue’,sans-serif; font-size:22px;
letter-spacing:1px; text-transform:uppercase;
transition: all 0.2s;
background:rgba(245,230,66,0.1);
color:var(–yellow);
border:1px solid rgba(245,230,66,0.25);
}
.mark-done-btn:hover { background:var(–yellow); color:#000; }
.mark-done-btn.is-done {
background: rgba(66,245,126,0.1);
color: var(–deficit-good);
border-color: rgba(66,245,126,0.25);
}
.mark-done-btn.is-done:hover {
background: var(–deficit-good); color:#000;
}

/* ── CARDIO SECTION ── */
.cardio-block {
margin:0 24px 24px;
padding:16px;
border:1px dashed rgba(255,255,255,0.1);
border-radius:8px;
}
.cardio-title {
font-family:‘DM Mono’,monospace; font-size:9px;
letter-spacing:0.2em; text-transform:uppercase;
color:rgba(255,255,255,0.3); margin-bottom:10px;
display:flex; align-items:center; gap:8px;
}
.cardio-title::after {
content:‘OPTIONAL’;
font-size:8px; padding:2px 6px;
background:rgba(255,255,255,0.06); border-radius:3px;
color:rgba(255,255,255,0.2);
}
.cardio-item {
font-size:13px; color:rgba(255,255,255,0.5);
padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.04);
line-height:1.5;
}
.cardio-item:last-child { border-bottom:none; }

/* ── NOTES ── */
.notes-section { padding:0 24px 8px; }
.notes-textarea {
width:100%; background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08); border-radius:8px;
padding:14px; color:rgba(255,255,255,0.7);
font-family:‘DM Sans’,sans-serif; font-size:13px;
resize:none; height:80px; outline:none;
transition: border-color 0.15s;
}
.notes-textarea:focus { border-color:rgba(255,255,255,0.2); }
.notes-textarea::placeholder { color:rgba(255,255,255,0.15); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#222; border-radius:2px; }

@media(max-width:480px) {
.calendar-grid { grid-template-columns: repeat(2, 1fr); }
.cal-grid { grid-template-columns:1fr; }
.deficit-meta { gap:12px; }
}
</style>

</head>
<body>

<!-- ── DEFICIT HEADER ── -->

<div class="deficit-header">
  <div class="deficit-left">
    <span class="deficit-label">10-Day Cumulative Deficit</span>
    <div class="deficit-value" id="totalDeficit">0</div>
  </div>
  <div class="header-title">PPL PROGRAM</div>
  <div class="deficit-meta">
    <div class="deficit-stat">
      <span>Burned Total</span>
      <span id="totalBurned">0</span>
    </div>
    <div class="deficit-stat">
      <span>Eaten Total</span>
      <span id="totalEaten">0</span>
    </div>
  </div>
</div>

<!-- ── CALENDAR ── -->

<div class="calendar-wrap">
  <div class="calendar-title">10<br><span>DAYS.</span></div>
  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<!-- ── DAY DETAIL OVERLAY ── -->

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-inner" id="detailInner"></div>
</div>

//  DATA
// ─────────────────────────────────────────────────────
const WEEKDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const START_DAY = 2; // Tuesday = index 2

function getWeekday(dayIndex) {
  return WEEKDAYS[(START_DAY + dayIndex) % 7];
}

const PLAN = [
  // ── DAY 1 · PUSH (light) ──
  { type:'push', focus:'Chest · Shoulders · Triceps',
    note:'Light weight, full range of motion. Re-establish motor patterns.',

    ],
    cardio:'10 min easy cycling or 8 min brisk walk'
  },
  // ── DAY 3 · LEGS (light) ──
  { type:'legs', focus:'Quads · Hamstrings · Glutes · Calves',

      { name:'DB Goblet Squat',         sets:'3', reps:'12', note:'Hold DB at chest, sit deep, knees track over toes' },

  // ── DAY 8 · REST ──
  { type:'rest', focus:'Recovery + Run',

  // ── DAY 9 · PUSH (further progressed) ──
  { type:'push', focus:'Chest · Shoulders · Triceps',

      { name:'DB Flat Press',           sets:'4', reps:'12', note:'Rep goal increased — control the tempo' },

const TYPE_LABEL = { push:'PUSH', pull:'PULL', legs:'LEGS', rest:'REST' };
const TYPE_BADGE = { push:'push-badge', pull:'pull-badge', legs:'legs-badge' };
const TYPE_TILE  = { push:'push-tile', pull:'pull-tile', legs:'legs-tile', rest:'rest-tile' };

// ─────────────────────────────────────────────────────
//  STORAGE
// ─────────────────────────────────────────────────────
function load() {
  try { return JSON.parse(localStorage.getItem('ppl10') || '{}'); } catch { return {}; }
}
function save(d) {
  try { localStorage.setItem('ppl10', JSON.stringify(d)); } catch {} }

// ─────────────────────────────────────────────────────
//  DEFICIT CALCULATIONS
// ─────────────────────────────────────────────────────
function calcDayDeficit(dayIdx) {
  const s = load();
  const burned   = parseFloat(s[`burned-${dayIdx}`])   || 0;
  const workout  = parseFloat(s[`workout-${dayIdx}`])  || 0;
  const intake   = parseFloat(s[`intake-${dayIdx}`])   || 0;
  if (!burned && !intake) return null;
  return (burned + workout) - intake;
}

function updateTotals() {
  const s = load();
  let totalBurned = 0, totalEaten = 0;
  for (let i = 0; i < 10; i++) {
    totalBurned += (parseFloat(s[`burned-${i}`]) || 0) + (parseFloat(s[`workout-${i}`]) || 0);
    totalEaten  += parseFloat(s[`intake-${i}`]) || 0;
  }
  const deficit = totalBurned - totalEaten;
  document.getElementById('totalBurned').textContent = totalBurned ? totalBurned.toLocaleString() : '0';
  document.getElementById('totalEaten').textContent  = totalEaten  ? totalEaten.toLocaleString()  : '0';
  const el = document.getElementById('totalDeficit');
  if (deficit === 0 && !totalBurned) {
    el.textContent = '0'; el.className = 'deficit-value';
  } else if (deficit >= 0) {
    el.textContent = '+' + deficit.toLocaleString() + ' kcal';
    el.className = 'deficit-value good';
  } else {
    el.textContent = deficit.toLocaleString() + ' kcal';
    el.className = 'deficit-value surplus';
  }
}

// ─────────────────────────────────────────────────────
//  CALENDAR RENDER
// ─────────────────────────────────────────────────────
function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  const s = load();

  PLAN.forEach((day, i) => {
    const tile = document.createElement('div');
    const done = !!s[`done-${i}`];
    tile.className = `day-tile ${TYPE_TILE[day.type]}${done ? ' done-tile' : ''}`;

    const deficit = calcDayDeficit(i);
    const defStr = deficit !== null
      ? `<span class="tile-deficit-display${deficit < 0 ? ' surplus' : ''}">${deficit >= 0 ? '+' : ''}${Math.round(deficit)} kcal</span>`
      : '';

    tile.innerHTML = `
      <div class="tile-top">
        <div>
          <div class="tile-day-num">${String(i+1).padStart(2,'0')}</div>
          <div class="tile-weekday">${getWeekday(i)}</div>
        </div>
      </div>
      <div>
        <div class="tile-type">${TYPE_LABEL[day.type]}</div>
        <div class="tile-focus">${day.focus}</div>
      </div>
      <div class="tile-bottom">
        ${done ? `<div class="tile-done-badge"><span class="star-icon">⭐</span>${defStr}</div>` : ''}
      </div>`;

    if (day.type !== 'rest' || day.cardio) {
      tile.addEventListener('click', () => openDetail(i));
      tile.style.cursor = 'pointer';
    }
    grid.appendChild(tile);
  });

  updateTotals();
}

// ─────────────────────────────────────────────────────
//  DETAIL VIEW

// ─────────────────────────────────────────────────────
//  SAVE FUNCTIONS
// ─────────────────────────────────────────────────────
function saveCalories(dayIdx) {
const s = load();
s[`burned-${dayIdx}`]  = document.getElementById(`inp-burned-${dayIdx}`)?.value  || ‘’;
s[`workout-${dayIdx}`] = document.getElementById(`inp-workout-${dayIdx}`)?.value || ‘’;
s[`intake-${dayIdx}`]  = document.getElementById(`inp-intake-${dayIdx}`)?.value  || ‘’;
save(s);

// update day deficit display inline
const deficit = calcDayDeficit(dayIdx);
const el = document.getElementById(`day-deficit-num-${dayIdx}`);
if (el) {
if (deficit === null) {
el.innerHTML = `<div class="day-deficit-num">—</div>`;
} else {
el.innerHTML = `<div class="day-deficit-num${deficit < 0 ? ' surplus' : ''}">${deficit >= 0 ? '+' : ''}${Math.round(deficit)}</div>`;
}
}
updateTotals();
}

function saveNotes(dayIdx) {
const s = load();
s[`notes-${dayIdx}`] = document.getElementById(`inp-notes-${dayIdx}`)?.value || ‘’;
save(s);
}

function toggleDone(dayIdx) {
const s = load();
s[`done-${dayIdx}`] = !s[`done-${dayIdx}`];
save(s);
const btn = document.getElementById(`done-btn-${dayIdx}`);
if (btn) {
const isDone = s[`done-${dayIdx}`];
btn.className = `mark-done-btn${isDone ? ' is-done' : ''}`;
btn.textContent = isDone ? ‘⭐ Completed — Tap to Undo’ : ‘Mark Workout Complete’;
}
renderCalendar();
}

// ─────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────
renderCalendar();
